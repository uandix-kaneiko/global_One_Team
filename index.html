<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KB Global One Team News</title>
<style>
:root{--gold:#FFBC00;--gold-dk:#E8A800;--gold-lt:#FFF8E0;--navy:#0E1E2D;--navy-lt:#162638;--navy-md:#1E3048;--ink:#0F1C2A;--body:#3A4A58;--muted:#6B7A8A;--pale:#9BAAB8;--paper:#F9F7F3;--card:#FFFFFF;--line:#E8E3DA;--warm:#F4F0E8;--blue:#EBF3FC;--blue-dk:#1A5EA8;--green:#EDF5F0;--green-dk:#1A7048;--purple:#F2EDFA;--purple-dk:#5C3EA0;--rose:#FBEFEC;--rose-dk:#A83028;--amber:#FBF5E4;--amber-dk:#8F6B12;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#DDD8CE;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1600px;margin:0 auto;background:var(--paper);box-shadow:0 0 60px rgba(0,0,0,.15);min-height:100vh}
.topbar{height:5px;background:linear-gradient(90deg,var(--gold),var(--gold-dk),var(--gold))}
header{background:var(--navy);color:#fff;padding:0}
.hd-top{display:flex;align-items:center;justify-content:space-between;padding:18px 44px 0;gap:20px}
.hd-brand{display:flex;align-items:baseline;gap:10px}
.hd-logo{font:800 34px Georgia,serif;letter-spacing:-1.5px}
.hd-logo em{color:var(--gold);font-style:normal}
.hd-tag{font-size:11px;color:#7A9AB8;font-weight:600;letter-spacing:.06em;white-space:nowrap}
.hd-right{display:flex;align-items:center;gap:16px}
.lang-pill{display:flex;border:1.5px solid rgba(255,255,255,.18);border-radius:20px;overflow:hidden}
.lang-pill button{background:0;border:0;color:rgba(255,255,255,.55);font-size:11px;font-weight:900;padding:5px 11px;cursor:pointer;transition:all .2s}
.lang-pill button.on{background:var(--gold);color:var(--navy);border-radius:18px}
.hd-meta{font-size:11px;color:#7A9AB8;text-align:right;line-height:1.65}
.hd-meta b{color:#C8D8E8}
.clock-strip{display:flex;overflow-x:auto;padding:10px 44px;border-top:1px solid rgba(255,255,255,.06);gap:0;scrollbar-width:none}
.clock-strip::-webkit-scrollbar{display:none}
.clk{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:6px 14px 6px 0;border-right:1px solid rgba(255,255,255,.08);margin-right:14px}
.clk:last-child{border-right:0}
.clk-flag{font-size:14px}
.clk-city{font-size:9px;font-weight:700;color:#7A9AB8;letter-spacing:.08em;display:block}
.clk-time{font-size:14px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;display:block}
.clk.sub .clk-time{color:var(--gold)}
.pulse-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 44px}
.pulse-card{border-radius:10px;padding:10px 13px;border:1px solid rgba(255,255,255,.08);transition:all .2s;display:flex;align-items:center;gap:12px}
.pulse-card:hover{border-color:rgba(255,188,0,.35)}
.pc-icon{font-size:24px}
.pc-label{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.02em;margin-bottom:2px}
.pc-sub{font-size:11px;color:#fff;line-height:1.4}
.main-nav{display:flex;gap:4px;padding:14px 44px;overflow-x:auto;scrollbar-width:none}
.main-nav::-webkit-scrollbar{display:none}
.main-nav button{background:0;border:0;border-bottom:3px solid transparent;padding:10px 16px;color:rgba(255,255,255,.48);font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .2s;border-radius:8px 8px 0 0}
.main-nav button:hover{color:rgba(255,255,255,.8)}
.main-nav button.active{background:rgba(255,188,0,.12);border-bottom-color:var(--gold);color:#fff}
.ticker{background:var(--navy-lt);border-top:1px solid rgba(255,255,255,.06);height:36px;overflow:hidden;position:relative}
.ticker-inner{position:absolute;display:inline-flex;animation:ticker 55s linear infinite}
.ticker:hover .ticker-inner{animation-play-state:paused}
.ticker-item{padding:8px 22px;font-size:11.5px;color:rgba(255,255,255,.7);border-right:1px solid rgba(255,255,255,.08);white-space:nowrap;display:flex;align-items:center;gap:7px}
.ticker-item b{color:var(--gold);font-size:10px;letter-spacing:.08em}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.page{display:none}
.page.active{display:block}
main{padding:36px 44px 60px}
.hero{display:grid;grid-template-columns:1.15fr .85fr;border-radius:18px;overflow:hidden;background:var(--navy);margin-bottom:30px;box-shadow:0 8px 40px rgba(14,30,45,.18)}
.hero-main{padding:32px 34px}
.hero-label{font-size:10px;font-weight:900;letter-spacing:.18em;color:var(--gold);margin-bottom:10px}
.hero-h{font:800 24px Georgia,serif;line-height:1.4;color:#fff;letter-spacing:-.5px;margin-bottom:12px}
.hero-p{font-size:13.5px;line-height:1.72;color:#A8BDD0}
.hero-chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:16px}
.chip{border:1px solid rgba(255,255,255,.2);border-radius:99px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.7)}
.hero-focus{padding:32px 30px;border-left:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.12);display:flex;flex-direction:column;justify-content:center}
.hero-focus-label{font-size:9px;font-weight:900;letter-spacing:.18em;color:var(--gold);margin-bottom:12px}
.hero-focus p{font-size:13px;line-height:1.75;color:#B8CDD8;margin:0}
.hero-focus p b{color:var(--gold)}
.bignum{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:30px}
.bn-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 24px;box-shadow:0 2px 16px rgba(14,30,45,.06);position:relative;overflow:hidden;transition:transform .2s}
.bn-card:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(14,30,45,.1)}
.bn-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--gold),var(--gold-dk))}
.bn-card.navy::before{background:linear-gradient(180deg,#2A5298,var(--navy))}
.bn-eye{font-size:10px;font-weight:900;letter-spacing:.14em;color:var(--muted);margin-bottom:10px}
.bn-num{font:900 48px Georgia,serif;line-height:1;color:var(--navy);margin-bottom:4px}
.bn-desc{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:4px}
.bn-ctx{font-size:12px;color:var(--body);line-height:1.6}
.sh{display:flex;align-items:flex-end;justify-content:space-between;margin:30px 0 14px}
.sh h2{font:800 22px Georgia,serif;letter-spacing:-.6px}
.sh .note{font-size:12px;color:var(--muted)}
.signals{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:30px}
.signal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 2px 16px rgba(14,30,45,.05);transition:all .2s;display:flex;flex-direction:column;cursor:pointer}
.signal:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(14,30,45,.1);border-color:var(--gold-dk)}
.sig-num{font:900 11px Georgia;color:var(--pale);margin-bottom:8px}
.sig-h{font-size:15px;font-weight:800;line-height:1.38;margin:10px 0 7px}
.sig-p{font-size:12px;line-height:1.58;color:var(--body);flex:1}
.tag{display:inline-block;border-radius:5px;padding:3px 8px;font-size:10px;font-weight:900;white-space:nowrap}
.t-econ{background:var(--blue);color:var(--blue-dk)}
.t-fin{background:var(--green);color:var(--green-dk)}
.t-risk{background:var(--rose);color:var(--rose-dk)}
.t-digital{background:var(--purple);color:var(--purple-dk)}
.t-esg{background:var(--amber);color:var(--amber-dk)}
.twocol{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-bottom:30px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;box-shadow:0 2px 16px rgba(14,30,45,.05)}
.panel h2{font:800 18px Georgia,serif;margin-bottom:16px}
.trend+.trend{border-top:1px solid #EEE9E0;padding-top:13px;margin-top:13px}
.trend b{font-size:14px;color:var(--ink);display:block;margin-bottom:5px}
.trend span{font-size:12.5px;color:var(--body);line-height:1.62}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi-cell{background:var(--warm);border:1px solid var(--line);border-radius:11px;padding:14px}
.kpi-cell b{font:900 24px Georgia;color:#8A6310;display:block;margin-bottom:3px}
.kpi-cell span{font-size:11.5px;color:var(--body);line-height:1.5}
.reporter{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.reporter::-webkit-scrollbar{display:none}
.rep-card{flex-shrink:0;width:240px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;border-left:4px solid var(--gold);box-shadow:0 2px 12px rgba(14,30,45,.05)}
.rep-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rep-flag{font-size:18px}
.rep-loc{font-size:11px;font-weight:800;color:var(--ink)}
.rep-time{font-size:10px;color:var(--muted);margin-left:auto}
.rep-quote{font-size:12px;line-height:1.65;color:var(--body);font-style:italic;margin:0}
.footer{border-top:1px solid var(--line);padding:20px 44px 28px;font-size:11px;color:var(--muted);background:var(--warm)}

.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(14,30,45,.85);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal.on{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:34px;width:100%;max-width:800px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.modal-close{position:absolute;top:20px;right:24px;background:var(--warm);border:0;width:36px;height:36px;border-radius:50%;font-size:18px;font-weight:bold;cursor:pointer;color:var(--navy);transition:all .2s}
.modal-close:hover{background:var(--line);color:#000}
.modal h2{font:800 24px Georgia, serif;margin-bottom:12px;color:var(--navy);line-height:1.3}
.modal-tag{display:inline-block;font-size:11px;font-weight:900;color:var(--gold-dk);background:var(--gold-lt);padding:4px 10px;border-radius:6px;margin-bottom:20px;}
.modal-detail{background:#fff;font-size:14.5px;line-height:1.8;color:#222;margin-bottom:24px;}
.modal-detail p{margin-bottom:14px; text-align: justify;}
.modal-detail ul { margin-left: 20px; margin-bottom: 14px; }
.modal-detail li { margin-bottom: 6px; }
.modal-insight{background:var(--navy);color:#fff;border-left:5px solid var(--gold);padding:22px;border-radius:10px;margin:24px 0;font-size:14px;line-height:1.7;box-shadow: 0 4px 15px rgba(0,0,0,0.1);}
.modal-insight-title{font-weight:900;color:var(--gold);margin-bottom:12px;font-size:16px;letter-spacing:0.05em;}
.modal-insight p{margin-bottom:8px; opacity:0.95;}
.sources-title{font-weight:800;margin:24px 0 12px;color:var(--navy); font-size:15px; border-top:1px solid var(--line); padding-top:20px;}
.source-item{background:var(--warm);border:1px solid var(--line);border-radius:8px;padding:12px 16px;margin:8px 0;transition:all .2s; display:flex; align-items:center; gap:10px;}
.source-item:hover{background:#E8E3DA; border-color:#D0C9BA;}
.source-item a{color:#1A5EA8;text-decoration:none;font-weight:800;font-size:12.5px;display:block;}
.source-item a:hover{text-decoration:underline}
.source-icon { font-size: 16px; }

.subpage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;}
.sp-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px; cursor: pointer; transition: all .2s; display:flex; flex-direction:column; justify-content:space-between; }
.sp-card:hover { transform: translateY(-4px); box-shadow: 0 10px 24px rgba(14,30,45,.08); border-color: var(--gold); }
.sp-card h3 { font-size: 17px; margin-bottom: 10px; color: var(--navy); }
.sp-card p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-top: 10px; }

@media(max-width:1080px){header,main{padding-left:24px;padding-right:24px}.pulse-strip{padding:12px 24px}.clock-strip{padding:10px 24px}.main-nav{padding:14px 24px}.footer{padding:18px 24px}.hero,.twocol,.engage-grid{grid-template-columns:1fr}.hero-focus{border-top:1px solid rgba(255,255,255,.08);border-left:0}.signals{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.signals,.bignum,.kpi,.subpage-grid{grid-template-columns:1fr}.pulse-strip{grid-template-columns:1fr}}

/* ===== Local Media Intelligence ===== */
.media-hero{border-radius:16px;padding:26px 28px;color:#fff;background:radial-gradient(circle at 86% 18%,rgba(255,188,0,.13),transparent 25%),linear-gradient(135deg,#0E1E2D 0%,#172E43 100%);box-shadow:0 10px 30px rgba(14,30,45,.14)}
.media-kicker{color:var(--gold);font-size:10px;font-weight:900;letter-spacing:.16em;margin-bottom:8px}.media-hero h2{font:800 25px Georgia,serif;letter-spacing:-.6px;margin-bottom:10px}.media-hero p{max-width:920px;color:#C4D2DE;font-size:13px;line-height:1.7}.media-rule{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-top:15px}.media-rule b{padding:4px 8px;border-radius:99px;background:rgba(255,188,0,.16);border:1px solid rgba(255,188,0,.3);color:var(--gold);font-size:9px;letter-spacing:.08em}.media-rule span{font-size:11px;font-weight:800;color:#EAF0F5}
.media-filters{display:flex;gap:7px;flex-wrap:wrap;margin:20px 0 13px}.media-filters button{border:1px solid var(--line);background:#fff;border-radius:99px;padding:8px 12px;color:var(--muted);font-size:11px;font-weight:900;cursor:pointer}.media-filters button.active{border-color:var(--navy);background:var(--navy);color:#fff}
.media-feed{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.media-article{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 2px 15px rgba(14,30,45,.05);display:flex;flex-direction:column}.media-top{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;color:var(--ink)}.media-top i{font-style:normal;font-size:9px;font-weight:900;color:var(--blue-dk);background:var(--blue);padding:4px 7px;border-radius:5px;white-space:nowrap}.media-source{display:flex;gap:5px;margin:10px 0 7px;font-size:10px;font-weight:800;color:var(--muted)}.media-article h3{font-size:15px;line-height:1.42;letter-spacing:-.3px;margin-bottom:8px;color:var(--navy)}.media-article>p{font-size:12px;line-height:1.64;color:var(--body);flex:1}.media-insight{margin-top:14px;padding:11px 12px;border-left:3px solid var(--gold);background:var(--gold-lt);border-radius:0 8px 8px 0}.media-insight b{display:block;font-size:10px;color:#8A6310;letter-spacing:.04em}.media-insight span{display:block;font-size:11.5px;color:#4C463A;line-height:1.55;margin-top:4px}.media-article>a{display:flex;justify-content:space-between;align-items:center;margin-top:14px;text-decoration:none;color:var(--blue-dk);font-size:11px;font-weight:900;border-top:1px solid var(--line);padding-top:11px}.media-article>a em{font-style:normal;font-size:14px}.media-empty{grid-column:1/-1;border:1px dashed #CFD7DF;background:#F6F9FC;border-radius:12px;padding:18px;color:var(--muted);font-size:12px;text-align:center}
.coverage-head{margin:31px 0 14px}.coverage-head>span{font-size:10px;font-weight:900;color:var(--gold-dk);letter-spacing:.14em}.coverage-head h2{font:800 20px Georgia,serif;letter-spacing:-.5px;margin-top:5px}.coverage-head p{margin-top:6px;color:var(--muted);font-size:11.5px}.coverage-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.coverage-card{border:1px solid var(--line);border-radius:12px;background:#fff;padding:14px;min-height:140px;box-shadow:0 2px 10px rgba(14,30,45,.04);border-top:3px solid #9BAAB8}.coverage-card.on{border-top-color:var(--gold)}.coverage-card>div{display:flex;justify-content:space-between;align-items:center;gap:4px;font-size:12px}.coverage-card>div span{font-size:8px;font-weight:900;background:var(--warm);color:#7B6B55;border-radius:4px;padding:3px 5px;white-space:nowrap}.coverage-card.on>div span{background:var(--gold-lt);color:#8A6310}.coverage-card p{margin-top:8px;font-size:10px;line-height:1.42;color:var(--muted);min-height:29px}.coverage-card small{display:block;margin-top:10px;font-size:9px;font-weight:900;color:var(--gold-dk)}
@media(max-width:1080px){.media-feed{grid-template-columns:repeat(2,1fr)}.coverage-grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:640px){.media-hero{padding:20px 18px}.media-hero h2{font-size:21px}.media-feed{grid-template-columns:1fr}.coverage-grid{grid-template-columns:1fr 1fr}.media-filters{overflow-x:auto;flex-wrap:nowrap;padding-bottom:3px}.media-filters button{white-space:nowrap}}

</style>
</head>

<div class="wrap">
<div class="topbar"></div>

const mt=v=>typeof v==='object'?(v[LANG]||v.ko||v.en||''):(v||'');
function renderCountryMedia(filter='all'){
 const feed=document.getElementById('localMediaFeed'); if(!feed)return;
 const articles=COUNTRY_MEDIA.flatMap(x=>x.a.map(a=>({...a,n:x.n,f:x.flag}))).filter(a=>filter==='all'||a.c.includes(filter));
 feed.innerHTML=articles.length?articles.map(a=>`<article class="media-article"><div class="media-top"><span>${a.f} <b>${mt(a.n)}</b></span><i>${mt(a.b)}</i></div><div class="media-source">${a.src} · ${a.d}</div><h3>${mt(a.t)}</h3><p>${mt(a.q)}</p><div class="media-insight"><b>${LANG==='ko'?'KB 시사점':'KB IMPLICATION'}</b><span>${mt(a.k)}</span></div><a href="${a.u}" target="_blank" rel="noopener">${LANG==='ko'?'원문 보기':'Read original'} <em>↗</em></a></article>`).join(''):`<div class="media-empty">${LANG==='ko'?'선택한 분류의 유의미한 신규 기사가 없습니다. 소스 모니터링은 유지합니다.':'No material new item in this category. Source monitoring remains active.'}</div>`;
}
function bindMediaFilters(){const x=document.getElementById('mediaFilters');if(!x)return;x.onclick=e=>{const b=e.target.closest('button[data-f]');if(!b)return;x.querySelectorAll('button').forEach(z=>z.classList.remove('active'));b.classList.add('active');renderCountryMedia(b.dataset.f)}}

function setLang(l){LANG=l;document.getElementById('btnKo').classList.toggle('on',l==='ko');document.getElementById('btnEn').classList.toggle('on',l==='en');renderHeader();buildClocks();renderPulse();buildTicker();renderNav();renderBrief();renderCountries();renderSubs();renderTopics();renderRegulations();renderParticipation();}
function tx(ko,en){return LANG==='ko'?ko:en;}

function buildClocks(){const el=document.getElementById('clockStrip');if(!el)return;const tzs=[{flag:'🇬🇧',city:{ko:'런던',en:'London'},tz:'Europe/London'},{flag:'🇺🇸',city:{ko:'뉴욕',en:'New York'},tz:'America/New_York'},{flag:'🇯🇵',city:{ko:'동경',en:'Tokyo'},tz:'Asia/Tokyo'},{flag:'🇸🇬',city:{ko:'싱가포르',en:'Singapore'},tz:'Asia/Singapore'}];const fmt=t=>{try{return new Date().toLocaleTimeString('ko-KR',{timeZone:t,hour:'2-digit',minute:'2-digit',hour12:false})}catch(e){return '--:--'}};el.innerHTML=tzs.map(c=>`<div class="clk"><span class="clk-flag">${c.flag}</span><div><span class="clk-city">${LANG==='ko'?c.city.ko:c.city.en}</span><span class="clk-time">${fmt(c.tz)}</span></div></div>`).join('');}
setInterval(buildClocks, 15000);

function renderHeader(){const t=TX[LANG];document.getElementById('hTagline').textContent=t.tagline;document.getElementById('hDate').textContent=t.date;document.getElementById('hSub').textContent=t.sub;document.getElementById('footerText').textContent=t.footerText;}
function renderPulse(){const el=document.getElementById('pulseStrip');if(!el)return;el.innerHTML=TX[LANG].pulse.map(p=>`<div class="pulse-card"><div class="pc-icon">${p.icon}</div><div><div class="pc-label">${p.label}</div><div class="pc-sub">${p.sub}</div></div></div>`).join('');}
function buildTicker(){const items=[{b:'BOJ',text:{ko:'정책금리 인상신호 강화 · 엔화 146 돌파',en:'Rate hike signal · JPY 146 breakthrough'}},{b:'FED',text:{ko:'3.50-3.75% 유지 · 달러 조달비용 모니터링',en:'3.50-3.75% hold · USD funding costs monitor'}}];const inner=document.getElementById('tickerInner');if(!inner)return;const h=items.map(x=>`<span class="ticker-item"><b>${x.b}</b>${tx(x.text.ko,x.text.en)}</span>`).join('');inner.innerHTML=h+h;}

function renderNav(){const t=TX[LANG];const el=document.getElementById('mainNav');if(!el)return;el.innerHTML=t.tabs.map((tab,i)=>`<button class="${i===0?'active':''}" data-page="${t.tabIds[i]}">${tab}</button>`).join('');el.onclick=e=>{if(e.target.tagName!=='BUTTON')return;el.querySelectorAll('button').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+e.target.dataset.page).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});};}

function renderBrief(){
  const t=TX[LANG];const el=document.getElementById('page-brief');if(!el)return;
  const sigH=t.signals.map((s,i)=>`<article class="signal" onclick="showModal('brief',${i})"><div class="sig-num">${s.n}</div><span class="tag ${s.cat}">${s.label}</span><h3 class="sig-h">${s.h}</h3><p class="sig-p">${s.p}</p></article>`).join('');
  const repH=t.reporters.map(r=>`<div class="rep-card"><div class="rep-top"><span class="rep-flag">${r.flag}</span><span class="rep-loc">${tx(r.loc,r.loc)}</span><span class="rep-time">${r.time}</span></div><p class="rep-quote">${tx(r.ko,r.en)}</p></div>`).join('');
  el.innerHTML=`<div class="hero"><div class="hero-main"><div class="hero-label">${t.heroLabel}</div><h1 class="hero-h">${t.heroH}</h1><p class="hero-p">${t.heroP}</p><div class="hero-chips">${t.heroChips.map(c=>`<span class="chip">${c}</span>`).join('')}</div></div><div class="hero-focus"><div class="hero-focus-label">${t.focusLabel}</div><p>${t.focusP.split('\n').join('<br>')}</p></div></div><div class="bignum"><div class="bn-card"><div class="bn-eye">${t.bnEye[0]}</div><div class="bn-num">5.75%</div><div class="bn-desc">${t.bnDesc[0]}</div><div class="bn-ctx">${t.bnCtx[0]}</div></div><div class="bn-card navy"><div class="bn-eye">${t.bnEye[1]}</div><div class="bn-num" style="color:#2A5298">3.50–3.75%</div><div class="bn-desc">${t.bnDesc[1]}</div><div class="bn-ctx">${t.bnCtx[1]}</div></div></div><div class="sh"><h2>${t.sigHead}</h2><span class="note">${t.sigNote}</span></div><div class="signals">${sigH}</div><div class="twocol"><section class="panel"><h2>${t.trendHead}</h2><div>${t.trends.map(tr=>`<div class="trend"><b>${tr.b}</b><span>${tr.s}</span></div>`).join('')}</div></section><section class="panel"><h2>${t.coverageHead}</h2><div class="kpi">${t.kpis.map(k=>`<div class="kpi-cell"><b>${k.b}</b><span>${k.s.split('\n').join('<br>')}</span></div>`).join('')}</div></section></div><div class="sh"><h2>${t.repHead}</h2><span class="note">${t.repNote}</span></div><div class="reporter">${repH}</div>`;
}

function renderCountries(){
  const el=document.getElementById('page-countries');if(!el)return;
  const coverage=COUNTRY_MEDIA.map(x=>`<article class="coverage-card ${x.a.length?'on':''}"><div><b>${x.flag} ${mt(x.n)}</b><span>${x.a.length?(LANG==='ko'?'ACTIVE':'ACTIVE'):(LANG==='ko'?'SOURCE WATCH':'SOURCE WATCH')}</span></div><p>${x.s}</p><small>${x.a.length?`${x.a.length} ${LANG==='ko'?'건 분석':'article(s) analysed'}`:(LANG==='ko'?'유의미 기사 선별 대기':'Awaiting material article')}</small></article>`).join('');
  el.innerHTML=`<section class="media-hero"><div class="media-kicker">LOCAL MEDIA INTELLIGENCE</div><h2>${LANG==='ko'?'진출국가 · 현지 주요언론 Intelligence':'Market Intelligence from Local Leading Media'}</h2><p>${LANG==='ko'?'사내 리포트 중심이 아니라 현지 주요언론의 금융·디지털·ESG·금융사고/리스크 기사를 선별합니다. 각 기사에는 핵심 요약, KB 시사점, 원문 링크를 함께 제공합니다.':'Rather than relying on internal reports, this view curates material finance, digital, ESG and incident/risk stories from leading local media, with a concise summary, KB implication and original link.'}</p><div class="media-rule"><b>${LANG==='ko'?'운영 원칙':'OPERATING RULE'}</b><span>${LANG==='ko'?'유의미한 기사만 노출하고, 기사 없는 국가는 SOURCE WATCH로 관리':'Show only material stories; keep other markets in SOURCE WATCH.'}</span></div></section><div class="media-filters" id="mediaFilters"><button class="active" data-f="all">${LANG==='ko'?'전체':'All'}</button><button data-f="finance">${LANG==='ko'?'금융':'Finance'}</button><button data-f="digital">${LANG==='ko'?'디지털':'Digital'}</button><button data-f="esg">ESG</button><button data-f="risk">${LANG==='ko'?'금융사고·리스크':'Incident · Risk'}</button></div><div class="media-feed" id="localMediaFeed"></div><div class="coverage-head"><span>COUNTRY SOURCE COVERAGE</span><h2>${LANG==='ko'?'10개 진출국가 현지 언론 소스 커버리지':'Local-media source coverage across 10 markets'}</h2><p>${LANG==='ko'?'경영 영향이 있는 기사만 본문으로 승격합니다.':'Only management-relevant stories are promoted into the daily feed.'}</p></div><div class="coverage-grid">${coverage}</div>`;
  bindMediaFilters();renderCountryMedia('all');
}

function renderSubs(){
  const t=TX[LANG]; const el=document.getElementById('page-subs');if(!el)return;
  const cards = t.subs.map((c, i) => `<div class="sp-card" onclick="showModal('sub', ${i})"><div><h3 style="font-size:16.5px;letter-spacing:-0.5px;color:var(--blue-dk)">🏢 ${c.h}</h3><p style="color:var(--body);font-weight:500;">${c.p}</p></div><div style="margin-top:16px; font-size:11px; color:var(--gold-dk); font-weight:bold; letter-spacing:0.05em;">경영실적·인사이트 ➔</div></div>`).join('');
  el.innerHTML=`<h2>국외연결자회사 (현지법인) 핵심 동향</h2><p style="color:var(--muted); font-size:13px; margin-top:5px; margin-bottom:20px;">각 자회사 카드를 클릭하여 턴어라운드 및 성장 전략을 확인하세요.</p><div class="subpage-grid">${cards}</div>`;
}

function renderTopics(){
  const t=TX[LANG]; const el=document.getElementById('page-topics');if(!el)return;
  const cards = t.topics.map((c, i) => `<div class="sp-card" onclick="showModal('topic', ${i})"><div><h3>📚 ${c.h}</h3><p>${c.p}</p></div><div style="margin-top:16px; font-size:11px; color:var(--gold-dk); font-weight:bold;">리포트 열람 ➔</div></div>`).join('');
  el.innerHTML=`<h2>주제별 심층 리포트 (Topic Watch)</h2><p style="color:var(--muted); font-size:13px; margin-top:5px; margin-bottom:20px;">주제를 클릭하여 풀버전 요약을 확인하세요.</p><div class="subpage-grid">${cards}</div>`;
}

function renderRegulations(){
  const el=document.getElementById('page-regulations');if(!el)return;
  el.innerHTML=`<h2>🏛️ 규제 · 금융기관 동향</h2><p style="color:var(--muted); font-size:13px; margin-top:5px;">글로벌 금융당국 규제 정보 및 유관기관 협력 소식이 업데이트될 예정입니다.</p>`;
}

function renderParticipation(){
  const el=document.getElementById('page-participation');if(!el)return;
  el.innerHTML=`<h2>📢 참여 코너</h2><p style="color:var(--muted); font-size:13px; margin-top:5px;">글로벌 거점 임직원 제안 및 글로벌 원팀 커뮤니티 공간이 오픈될 예정입니다.</p>`;
}

function showModal(type,idx){
  const t=TX[LANG]; let data = null; let tagText = '';
  if(type === 'brief') { data = t.signals[idx]; tagText = data.label; }
  else if(type === 'country') { data = t.countries[idx]; tagText = LANG==='ko'?'국가별 영업 현안':'Regional Analysis'; }
  else if(type === 'sub') { data = t.subs[idx]; tagText = LANG==='ko'?'자회사 경영 진단':'Subsidiary Insight'; }
  else if(type === 'topic') { data = t.topics[idx]; tagText = LANG==='ko'?'주제별 인사이트':'Topic Insight'; }

  if(data) {
    document.getElementById('modal-tag').textContent = tagText;
    document.getElementById('modal-title').textContent = data.h;
    document.getElementById('modal-detail').innerHTML = `<div class="modal-detail">${data.detail}</div>`;
    document.getElementById('modal-insight').innerHTML = `<div class="modal-insight"><div class="modal-insight-title">💡 Global One Team Insight (액션플랜)</div>${data.insight}</div>`;
    let sourcesHtml = '';
    if(data.sources && data.sources.length > 0) {
      sourcesHtml = data.sources.map(s => `<div class="source-item"><span class="source-icon">📄</span><a href="${s.url}" target="_blank">${s.title}</a></div>`).join('');
    } else { sourcesHtml = `<div class="source-item" style="color:var(--muted); font-size:12px;">사내 인텔리전스 통합 리포트 (추가 링크 없음)</div>`; }
    document.getElementById('modal-sources').innerHTML = sourcesHtml;
    document.getElementById('modal').classList.add('on');
  }
}
function closeModal(){document.getElementById('modal').classList.remove('on');}

// Init
buildClocks();renderHeader();renderPulse();buildTicker();renderNav();renderBrief();renderCountries();renderSubs();renderTopics();renderRegulations();renderParticipation();
</script>
